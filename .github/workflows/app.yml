name: App Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "auth-service/**"
      - "request-service/**"
      - "billing-service/**"
      - "analytics-service/**"
      - "api-gateway/**"
      - "docker-compose.yml"
      - ".github/workflows/app.yml"

jobs:
  deploy-app:
    name: Build, Push, and Deploy Services
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    env:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      CDK_STACK_NAME: ${{ vars.CDK_STACK_NAME }}
      CDK_ECR_STACK_NAME: ${{ vars.CDK_ECR_STACK_NAME }}
      ECR_REPOSITORY_AUTH_SERVICE: ${{ vars.ECR_REPOSITORY_AUTH_SERVICE }}
      ECR_REPOSITORY_REQUEST_SERVICE: ${{ vars.ECR_REPOSITORY_REQUEST_SERVICE }}
      ECR_REPOSITORY_BILLING_SERVICE: ${{ vars.ECR_REPOSITORY_BILLING_SERVICE }}
      ECR_REPOSITORY_ANALYTICS_SERVICE: ${{ vars.ECR_REPOSITORY_ANALYTICS_SERVICE }}
      ECR_REPOSITORY_API_GATEWAY: ${{ vars.ECR_REPOSITORY_API_GATEWAY }}
      ECS_CLUSTER_NAME: ${{ vars.ECS_CLUSTER_NAME }}
      ECS_SERVICE_AUTH_SERVICE: ${{ vars.ECS_SERVICE_AUTH_SERVICE }}
      ECS_SERVICE_REQUEST_SERVICE: ${{ vars.ECS_SERVICE_REQUEST_SERVICE }}
      ECS_SERVICE_BILLING_SERVICE: ${{ vars.ECS_SERVICE_BILLING_SERVICE }}
      ECS_SERVICE_ANALYTICS_SERVICE: ${{ vars.ECS_SERVICE_ANALYTICS_SERVICE }}
      ECS_SERVICE_API_GATEWAY: ${{ vars.ECS_SERVICE_API_GATEWAY }}
      ECS_SERVICE_DESIRED_COUNT: ${{ vars.ECS_SERVICE_DESIRED_COUNT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required app deployment settings
        run: |
          : "${CDK_STACK_NAME:=campus-service-hub}"
          : "${CDK_ECR_STACK_NAME:=campus-service-hub-ecr}"

          required=(
            AWS_REGION
            AWS_ACCOUNT_ID
            AWS_ROLE_ARN
          )

          missing=0
          for key in "${required[@]}"; do
            if [ -z "${!key}" ]; then
              echo "Missing required GitHub Actions setting: $key" >&2
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve deployment targets
        run: |
          set -euo pipefail

          : "${CDK_STACK_NAME:=campus-service-hub}"
          : "${CDK_ECR_STACK_NAME:=campus-service-hub-ecr}"

          if [ -z "${ECR_REPOSITORY_AUTH_SERVICE}" ] && [ -n "${CDK_ECR_STACK_NAME}" ]; then
            ECR_REPOSITORY_AUTH_SERVICE="$(aws cloudformation describe-stacks --stack-name "${CDK_ECR_STACK_NAME}" --query "Stacks[0].Outputs[?OutputKey=='EcrRepositoryAuthServiceName'].OutputValue | [0]" --output text)"
          fi
          if [ -z "${ECR_REPOSITORY_REQUEST_SERVICE}" ] && [ -n "${CDK_ECR_STACK_NAME}" ]; then
            ECR_REPOSITORY_REQUEST_SERVICE="$(aws cloudformation describe-stacks --stack-name "${CDK_ECR_STACK_NAME}" --query "Stacks[0].Outputs[?OutputKey=='EcrRepositoryRequestServiceName'].OutputValue | [0]" --output text)"
          fi
          if [ -z "${ECR_REPOSITORY_BILLING_SERVICE}" ] && [ -n "${CDK_ECR_STACK_NAME}" ]; then
            ECR_REPOSITORY_BILLING_SERVICE="$(aws cloudformation describe-stacks --stack-name "${CDK_ECR_STACK_NAME}" --query "Stacks[0].Outputs[?OutputKey=='EcrRepositoryBillingServiceName'].OutputValue | [0]" --output text)"
          fi
          if [ -z "${ECR_REPOSITORY_ANALYTICS_SERVICE}" ] && [ -n "${CDK_ECR_STACK_NAME}" ]; then
            ECR_REPOSITORY_ANALYTICS_SERVICE="$(aws cloudformation describe-stacks --stack-name "${CDK_ECR_STACK_NAME}" --query "Stacks[0].Outputs[?OutputKey=='EcrRepositoryAnalyticsServiceName'].OutputValue | [0]" --output text)"
          fi
          if [ -z "${ECR_REPOSITORY_API_GATEWAY}" ] && [ -n "${CDK_ECR_STACK_NAME}" ]; then
            ECR_REPOSITORY_API_GATEWAY="$(aws cloudformation describe-stacks --stack-name "${CDK_ECR_STACK_NAME}" --query "Stacks[0].Outputs[?OutputKey=='EcrRepositoryApiGatewayName'].OutputValue | [0]" --output text)"
          fi

          for value in \
            "${ECR_REPOSITORY_AUTH_SERVICE}" \
            "${ECR_REPOSITORY_REQUEST_SERVICE}" \
            "${ECR_REPOSITORY_BILLING_SERVICE}" \
            "${ECR_REPOSITORY_ANALYTICS_SERVICE}" \
            "${ECR_REPOSITORY_API_GATEWAY}"; do
            if [ -z "${value}" ] || [ "${value}" = "None" ] || [ "${value}" = "null" ]; then
              echo "Failed to resolve ECR repository names. Ensure infra workflow deployed ECR stack successfully." >&2
              exit 1
            fi
          done

          : "${ECS_SERVICE_AUTH_SERVICE:=auth-service}"
          : "${ECS_SERVICE_REQUEST_SERVICE:=request-service}"
          : "${ECS_SERVICE_BILLING_SERVICE:=billing-service}"
          : "${ECS_SERVICE_ANALYTICS_SERVICE:=analytics-service}"
          : "${ECS_SERVICE_API_GATEWAY:=api-gateway}"
          : "${ECS_SERVICE_DESIRED_COUNT:=1}"

          if [ -z "${ECS_CLUSTER_NAME}" ]; then
            ECS_CLUSTER_NAME="$(aws cloudformation describe-stack-resources \
              --stack-name "${CDK_STACK_NAME}" \
              --query "StackResources[?ResourceType=='AWS::ECS::Cluster'].PhysicalResourceId | [0]" \
              --output text)"
          fi

          if [ -z "${ECS_CLUSTER_NAME}" ] || [ "${ECS_CLUSTER_NAME}" = "None" ] || [ "${ECS_CLUSTER_NAME}" = "null" ]; then
            echo "Failed to resolve ECS_CLUSTER_NAME. Ensure infra workflow deployed core stack successfully." >&2
            exit 1
          fi

          echo "ECR_REPOSITORY_AUTH_SERVICE=${ECR_REPOSITORY_AUTH_SERVICE}" >> "$GITHUB_ENV"
          echo "ECR_REPOSITORY_REQUEST_SERVICE=${ECR_REPOSITORY_REQUEST_SERVICE}" >> "$GITHUB_ENV"
          echo "ECR_REPOSITORY_BILLING_SERVICE=${ECR_REPOSITORY_BILLING_SERVICE}" >> "$GITHUB_ENV"
          echo "ECR_REPOSITORY_ANALYTICS_SERVICE=${ECR_REPOSITORY_ANALYTICS_SERVICE}" >> "$GITHUB_ENV"
          echo "ECR_REPOSITORY_API_GATEWAY=${ECR_REPOSITORY_API_GATEWAY}" >> "$GITHUB_ENV"
          echo "ECS_CLUSTER_NAME=${ECS_CLUSTER_NAME}" >> "$GITHUB_ENV"
          echo "ECS_SERVICE_AUTH_SERVICE=${ECS_SERVICE_AUTH_SERVICE}" >> "$GITHUB_ENV"
          echo "ECS_SERVICE_REQUEST_SERVICE=${ECS_SERVICE_REQUEST_SERVICE}" >> "$GITHUB_ENV"
          echo "ECS_SERVICE_BILLING_SERVICE=${ECS_SERVICE_BILLING_SERVICE}" >> "$GITHUB_ENV"
          echo "ECS_SERVICE_ANALYTICS_SERVICE=${ECS_SERVICE_ANALYTICS_SERVICE}" >> "$GITHUB_ENV"
          echo "ECS_SERVICE_API_GATEWAY=${ECS_SERVICE_API_GATEWAY}" >> "$GITHUB_ENV"
          echo "ECS_SERVICE_DESIRED_COUNT=${ECS_SERVICE_DESIRED_COUNT}" >> "$GITHUB_ENV"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push service images
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

          build_and_push() {
            local context="$1"
            local repository="$2"
            local image_uri="${ECR_REGISTRY}/${repository}"

            echo "Building ${image_uri}:${IMAGE_TAG}"
            docker build -t "${image_uri}:${IMAGE_TAG}" -t "${image_uri}:latest" "${context}"
            docker push "${image_uri}:${IMAGE_TAG}"
            docker push "${image_uri}:latest"
          }

          build_and_push "./auth-service" "${ECR_REPOSITORY_AUTH_SERVICE}"
          build_and_push "./request-service" "${ECR_REPOSITORY_REQUEST_SERVICE}"
          build_and_push "./billing-service" "${ECR_REPOSITORY_BILLING_SERVICE}"
          build_and_push "./analytics-service" "${ECR_REPOSITORY_ANALYTICS_SERVICE}"
          build_and_push "./api-gateway" "${ECR_REPOSITORY_API_GATEWAY}"

      - name: Trigger ECS rolling deploy
        run: |
          set -euo pipefail

          aws ecs update-service --cluster "${ECS_CLUSTER_NAME}" --service "${ECS_SERVICE_AUTH_SERVICE}" --desired-count "${ECS_SERVICE_DESIRED_COUNT}" --force-new-deployment >/dev/null
          aws ecs update-service --cluster "${ECS_CLUSTER_NAME}" --service "${ECS_SERVICE_REQUEST_SERVICE}" --desired-count "${ECS_SERVICE_DESIRED_COUNT}" --force-new-deployment >/dev/null
          aws ecs update-service --cluster "${ECS_CLUSTER_NAME}" --service "${ECS_SERVICE_BILLING_SERVICE}" --desired-count "${ECS_SERVICE_DESIRED_COUNT}" --force-new-deployment >/dev/null
          aws ecs update-service --cluster "${ECS_CLUSTER_NAME}" --service "${ECS_SERVICE_ANALYTICS_SERVICE}" --desired-count "${ECS_SERVICE_DESIRED_COUNT}" --force-new-deployment >/dev/null
          aws ecs update-service --cluster "${ECS_CLUSTER_NAME}" --service "${ECS_SERVICE_API_GATEWAY}" --desired-count "${ECS_SERVICE_DESIRED_COUNT}" --force-new-deployment >/dev/null

      - name: Wait for ECS services to stabilize
        run: |
          set -euo pipefail

          aws ecs wait services-stable --cluster "${ECS_CLUSTER_NAME}" --services "${ECS_SERVICE_AUTH_SERVICE}"
          aws ecs wait services-stable --cluster "${ECS_CLUSTER_NAME}" --services "${ECS_SERVICE_REQUEST_SERVICE}"
          aws ecs wait services-stable --cluster "${ECS_CLUSTER_NAME}" --services "${ECS_SERVICE_BILLING_SERVICE}"
          aws ecs wait services-stable --cluster "${ECS_CLUSTER_NAME}" --services "${ECS_SERVICE_ANALYTICS_SERVICE}"
          aws ecs wait services-stable --cluster "${ECS_CLUSTER_NAME}" --services "${ECS_SERVICE_API_GATEWAY}"
