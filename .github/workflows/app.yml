name: App Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "auth-service/**"
      - "request-service/**"
      - "billing-service/**"
      - "analytics-service/**"
      - "api-gateway/**"
      - "docker-compose.yml"
      - ".github/workflows/app.yml"

jobs:
  deploy-app:
    name: Build, Push, and Deploy Services
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    env:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      CDK_STACK_NAME: ${{ vars.CDK_STACK_NAME }}
      CDK_ECR_STACK_NAME: ${{ vars.CDK_ECR_STACK_NAME }}
      ECR_REPOSITORY_AUTH_SERVICE: ${{ vars.ECR_REPOSITORY_AUTH_SERVICE }}
      ECR_REPOSITORY_REQUEST_SERVICE: ${{ vars.ECR_REPOSITORY_REQUEST_SERVICE }}
      ECR_REPOSITORY_BILLING_SERVICE: ${{ vars.ECR_REPOSITORY_BILLING_SERVICE }}
      ECR_REPOSITORY_ANALYTICS_SERVICE: ${{ vars.ECR_REPOSITORY_ANALYTICS_SERVICE }}
      ECR_REPOSITORY_API_GATEWAY: ${{ vars.ECR_REPOSITORY_API_GATEWAY }}
      ECS_CLUSTER_NAME: ${{ vars.ECS_CLUSTER_NAME }}
      ECS_SERVICE_AUTH_SERVICE: ${{ vars.ECS_SERVICE_AUTH_SERVICE }}
      ECS_SERVICE_REQUEST_SERVICE: ${{ vars.ECS_SERVICE_REQUEST_SERVICE }}
      ECS_SERVICE_BILLING_SERVICE: ${{ vars.ECS_SERVICE_BILLING_SERVICE }}
      ECS_SERVICE_ANALYTICS_SERVICE: ${{ vars.ECS_SERVICE_ANALYTICS_SERVICE }}
      ECS_SERVICE_API_GATEWAY: ${{ vars.ECS_SERVICE_API_GATEWAY }}
      ECS_SERVICE_DESIRED_COUNT: ${{ vars.ECS_SERVICE_DESIRED_COUNT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Validate required app deployment settings
        run: |
          : "${CDK_STACK_NAME:=campus-service-hub}"
          : "${CDK_ECR_STACK_NAME:=campus-service-hub-ecr}"

          required=(
            AWS_REGION
            AWS_ACCOUNT_ID
            AWS_ROLE_ARN
          )

          missing=0
          for key in "${required[@]}"; do
            if [ -z "${!key}" ]; then
              echo "Missing required GitHub Actions setting: $key" >&2
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Detect changed services
        id: changes
        run: |
          set -euo pipefail

          # On workflow_dispatch there is no previous commit to diff against —
          # treat all services as changed so a manual trigger always deploys everything.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger — marking all services changed."
            echo "auth=true"           >> "$GITHUB_OUTPUT"
            echo "request=true"        >> "$GITHUB_OUTPUT"
            echo "billing=true"        >> "$GITHUB_OUTPUT"
            echo "analytics=true"      >> "$GITHUB_OUTPUT"
            echo "gateway=true"        >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          # If workflow config itself changed, rebuild everything.
          if echo "$CHANGED" | grep -qE "^\.github/workflows/app\.yml$|^docker-compose\.yml$"; then
            echo "Workflow or compose file changed — marking all services changed."
            echo "auth=true"           >> "$GITHUB_OUTPUT"
            echo "request=true"        >> "$GITHUB_OUTPUT"
            echo "billing=true"        >> "$GITHUB_OUTPUT"
            echo "analytics=true"      >> "$GITHUB_OUTPUT"
            echo "gateway=true"        >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "$CHANGED" | grep -q "^auth-service/"      && echo "auth=true"      >> "$GITHUB_OUTPUT" || echo "auth=false"      >> "$GITHUB_OUTPUT"
          echo "$CHANGED" | grep -q "^request-service/"   && echo "request=true"   >> "$GITHUB_OUTPUT" || echo "request=false"   >> "$GITHUB_OUTPUT"
          echo "$CHANGED" | grep -q "^billing-service/"   && echo "billing=true"   >> "$GITHUB_OUTPUT" || echo "billing=false"   >> "$GITHUB_OUTPUT"
          echo "$CHANGED" | grep -q "^analytics-service/" && echo "analytics=true" >> "$GITHUB_OUTPUT" || echo "analytics=false" >> "$GITHUB_OUTPUT"
          echo "$CHANGED" | grep -q "^api-gateway/"       && echo "gateway=true"   >> "$GITHUB_OUTPUT" || echo "gateway=false"   >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve deployment targets
        run: |
          set -euo pipefail

          : "${CDK_STACK_NAME:=campus-service-hub}"
          : "${CDK_ECR_STACK_NAME:=campus-service-hub-ecr}"

          if [ -z "${ECR_REPOSITORY_AUTH_SERVICE}" ] && [ -n "${CDK_ECR_STACK_NAME}" ]; then
            ECR_REPOSITORY_AUTH_SERVICE="$(aws cloudformation describe-stacks --stack-name "${CDK_ECR_STACK_NAME}" --query "Stacks[0].Outputs[?OutputKey=='EcrRepositoryAuthServiceName'].OutputValue | [0]" --output text)"
          fi
          if [ -z "${ECR_REPOSITORY_REQUEST_SERVICE}" ] && [ -n "${CDK_ECR_STACK_NAME}" ]; then
            ECR_REPOSITORY_REQUEST_SERVICE="$(aws cloudformation describe-stacks --stack-name "${CDK_ECR_STACK_NAME}" --query "Stacks[0].Outputs[?OutputKey=='EcrRepositoryRequestServiceName'].OutputValue | [0]" --output text)"
          fi
          if [ -z "${ECR_REPOSITORY_BILLING_SERVICE}" ] && [ -n "${CDK_ECR_STACK_NAME}" ]; then
            ECR_REPOSITORY_BILLING_SERVICE="$(aws cloudformation describe-stacks --stack-name "${CDK_ECR_STACK_NAME}" --query "Stacks[0].Outputs[?OutputKey=='EcrRepositoryBillingServiceName'].OutputValue | [0]" --output text)"
          fi
          if [ -z "${ECR_REPOSITORY_ANALYTICS_SERVICE}" ] && [ -n "${CDK_ECR_STACK_NAME}" ]; then
            ECR_REPOSITORY_ANALYTICS_SERVICE="$(aws cloudformation describe-stacks --stack-name "${CDK_ECR_STACK_NAME}" --query "Stacks[0].Outputs[?OutputKey=='EcrRepositoryAnalyticsServiceName'].OutputValue | [0]" --output text)"
          fi
          if [ -z "${ECR_REPOSITORY_API_GATEWAY}" ] && [ -n "${CDK_ECR_STACK_NAME}" ]; then
            ECR_REPOSITORY_API_GATEWAY="$(aws cloudformation describe-stacks --stack-name "${CDK_ECR_STACK_NAME}" --query "Stacks[0].Outputs[?OutputKey=='EcrRepositoryApiGatewayName'].OutputValue | [0]" --output text)"
          fi

          for value in \
            "${ECR_REPOSITORY_AUTH_SERVICE}" \
            "${ECR_REPOSITORY_REQUEST_SERVICE}" \
            "${ECR_REPOSITORY_BILLING_SERVICE}" \
            "${ECR_REPOSITORY_ANALYTICS_SERVICE}" \
            "${ECR_REPOSITORY_API_GATEWAY}"; do
            if [ -z "${value}" ] || [ "${value}" = "None" ] || [ "${value}" = "null" ]; then
              echo "Failed to resolve ECR repository names. Ensure infra workflow deployed ECR stack successfully." >&2
              exit 1
            fi
          done

          : "${ECS_SERVICE_AUTH_SERVICE:=auth-service}"
          : "${ECS_SERVICE_REQUEST_SERVICE:=request-service}"
          : "${ECS_SERVICE_BILLING_SERVICE:=billing-service}"
          : "${ECS_SERVICE_ANALYTICS_SERVICE:=analytics-service}"
          : "${ECS_SERVICE_API_GATEWAY:=api-gateway}"
          : "${ECS_SERVICE_DESIRED_COUNT:=1}"

          if [ -z "${ECS_CLUSTER_NAME}" ]; then
            ECS_CLUSTER_NAME="$(aws cloudformation describe-stack-resources \
              --stack-name "${CDK_STACK_NAME}" \
              --query "StackResources[?ResourceType=='AWS::ECS::Cluster'].PhysicalResourceId | [0]" \
              --output text)"
          fi

          if [ -z "${ECS_CLUSTER_NAME}" ] || [ "${ECS_CLUSTER_NAME}" = "None" ] || [ "${ECS_CLUSTER_NAME}" = "null" ]; then
            echo "Failed to resolve ECS_CLUSTER_NAME. Ensure infra workflow deployed core stack successfully." >&2
            exit 1
          fi

          echo "ECR_REPOSITORY_AUTH_SERVICE=${ECR_REPOSITORY_AUTH_SERVICE}" >> "$GITHUB_ENV"
          echo "ECR_REPOSITORY_REQUEST_SERVICE=${ECR_REPOSITORY_REQUEST_SERVICE}" >> "$GITHUB_ENV"
          echo "ECR_REPOSITORY_BILLING_SERVICE=${ECR_REPOSITORY_BILLING_SERVICE}" >> "$GITHUB_ENV"
          echo "ECR_REPOSITORY_ANALYTICS_SERVICE=${ECR_REPOSITORY_ANALYTICS_SERVICE}" >> "$GITHUB_ENV"
          echo "ECR_REPOSITORY_API_GATEWAY=${ECR_REPOSITORY_API_GATEWAY}" >> "$GITHUB_ENV"
          echo "ECS_CLUSTER_NAME=${ECS_CLUSTER_NAME}" >> "$GITHUB_ENV"
          echo "ECS_SERVICE_AUTH_SERVICE=${ECS_SERVICE_AUTH_SERVICE}" >> "$GITHUB_ENV"
          echo "ECS_SERVICE_REQUEST_SERVICE=${ECS_SERVICE_REQUEST_SERVICE}" >> "$GITHUB_ENV"
          echo "ECS_SERVICE_BILLING_SERVICE=${ECS_SERVICE_BILLING_SERVICE}" >> "$GITHUB_ENV"
          echo "ECS_SERVICE_ANALYTICS_SERVICE=${ECS_SERVICE_ANALYTICS_SERVICE}" >> "$GITHUB_ENV"
          echo "ECS_SERVICE_API_GATEWAY=${ECS_SERVICE_API_GATEWAY}" >> "$GITHUB_ENV"
          echo "ECS_SERVICE_DESIRED_COUNT=${ECS_SERVICE_DESIRED_COUNT}" >> "$GITHUB_ENV"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push changed service images
        env:
          IMAGE_TAG: ${{ github.sha }}
          AUTH_CHANGED: ${{ steps.changes.outputs.auth }}
          REQUEST_CHANGED: ${{ steps.changes.outputs.request }}
          BILLING_CHANGED: ${{ steps.changes.outputs.billing }}
          ANALYTICS_CHANGED: ${{ steps.changes.outputs.analytics }}
          GATEWAY_CHANGED: ${{ steps.changes.outputs.gateway }}
        run: |
          set -euo pipefail
          ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

          build_and_push() {
            local context="$1"
            local repository="$2"
            local image_uri="${ECR_REGISTRY}/${repository}"

            echo "Building linux/amd64 ${image_uri}:${IMAGE_TAG}"
            docker buildx build \
              --platform linux/amd64 \
              --tag "${image_uri}:${IMAGE_TAG}" \
              --tag "${image_uri}:latest" \
              --push \
              "${context}"
          }

          [ "${AUTH_CHANGED}" = "true" ]      && build_and_push "./auth-service"      "${ECR_REPOSITORY_AUTH_SERVICE}"
          [ "${REQUEST_CHANGED}" = "true" ]   && build_and_push "./request-service"   "${ECR_REPOSITORY_REQUEST_SERVICE}"
          [ "${BILLING_CHANGED}" = "true" ]   && build_and_push "./billing-service"   "${ECR_REPOSITORY_BILLING_SERVICE}"
          [ "${ANALYTICS_CHANGED}" = "true" ] && build_and_push "./analytics-service" "${ECR_REPOSITORY_ANALYTICS_SERVICE}"
          [ "${GATEWAY_CHANGED}" = "true" ]   && build_and_push "./api-gateway"       "${ECR_REPOSITORY_API_GATEWAY}"

      - name: Trigger ECS rolling deploy for changed services
        env:
          AUTH_CHANGED: ${{ steps.changes.outputs.auth }}
          REQUEST_CHANGED: ${{ steps.changes.outputs.request }}
          BILLING_CHANGED: ${{ steps.changes.outputs.billing }}
          ANALYTICS_CHANGED: ${{ steps.changes.outputs.analytics }}
          GATEWAY_CHANGED: ${{ steps.changes.outputs.gateway }}
        run: |
          set -euo pipefail

          [ "${AUTH_CHANGED}" = "true" ]      && aws ecs update-service --cluster "${ECS_CLUSTER_NAME}" --service "${ECS_SERVICE_AUTH_SERVICE}"      --desired-count "${ECS_SERVICE_DESIRED_COUNT}" --force-new-deployment >/dev/null
          [ "${REQUEST_CHANGED}" = "true" ]   && aws ecs update-service --cluster "${ECS_CLUSTER_NAME}" --service "${ECS_SERVICE_REQUEST_SERVICE}"   --desired-count "${ECS_SERVICE_DESIRED_COUNT}" --force-new-deployment >/dev/null
          [ "${BILLING_CHANGED}" = "true" ]   && aws ecs update-service --cluster "${ECS_CLUSTER_NAME}" --service "${ECS_SERVICE_BILLING_SERVICE}"   --desired-count "${ECS_SERVICE_DESIRED_COUNT}" --force-new-deployment >/dev/null
          [ "${ANALYTICS_CHANGED}" = "true" ] && aws ecs update-service --cluster "${ECS_CLUSTER_NAME}" --service "${ECS_SERVICE_ANALYTICS_SERVICE}" --desired-count "${ECS_SERVICE_DESIRED_COUNT}" --force-new-deployment >/dev/null
          [ "${GATEWAY_CHANGED}" = "true" ]   && aws ecs update-service --cluster "${ECS_CLUSTER_NAME}" --service "${ECS_SERVICE_API_GATEWAY}"       --desired-count "${ECS_SERVICE_DESIRED_COUNT}" --force-new-deployment >/dev/null

      - name: Wait for changed services to stabilize
        env:
          AUTH_CHANGED: ${{ steps.changes.outputs.auth }}
          REQUEST_CHANGED: ${{ steps.changes.outputs.request }}
          BILLING_CHANGED: ${{ steps.changes.outputs.billing }}
          ANALYTICS_CHANGED: ${{ steps.changes.outputs.analytics }}
          GATEWAY_CHANGED: ${{ steps.changes.outputs.gateway }}
        run: |
          set -euo pipefail

          CHANGED_SERVICES=()
          [ "${AUTH_CHANGED}" = "true" ]      && CHANGED_SERVICES+=("${ECS_SERVICE_AUTH_SERVICE}")
          [ "${REQUEST_CHANGED}" = "true" ]   && CHANGED_SERVICES+=("${ECS_SERVICE_REQUEST_SERVICE}")
          [ "${BILLING_CHANGED}" = "true" ]   && CHANGED_SERVICES+=("${ECS_SERVICE_BILLING_SERVICE}")
          [ "${ANALYTICS_CHANGED}" = "true" ] && CHANGED_SERVICES+=("${ECS_SERVICE_ANALYTICS_SERVICE}")
          [ "${GATEWAY_CHANGED}" = "true" ]   && CHANGED_SERVICES+=("${ECS_SERVICE_API_GATEWAY}")

          if [ ${#CHANGED_SERVICES[@]} -eq 0 ]; then
            echo "No services changed — nothing to wait for."
            exit 0
          fi

          echo "Waiting for: ${CHANGED_SERVICES[*]}"
          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER_NAME}" \
            --services "${CHANGED_SERVICES[@]}"
