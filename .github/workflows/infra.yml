name: Infra Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "infrastructure/**"
      - ".github/workflows/infra.yml"

jobs:
  deploy-infra:
    name: Deploy CDK Stacks
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    env:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      CDK_STACK_NAME: ${{ vars.CDK_STACK_NAME }}
      CDK_ECR_STACK_NAME: ${{ vars.CDK_ECR_STACK_NAME }}
      CDK_KAFKA_STACK_NAME: ${{ vars.CDK_KAFKA_STACK_NAME }}
      CDK_OIDC_STACK_NAME: ${{ vars.CDK_OIDC_STACK_NAME }}
      GITHUB_OWNER: ${{ vars.GITHUB_OWNER }}
      GITHUB_REPO: ${{ vars.GITHUB_REPO }}
      GITHUB_BRANCH: ${{ vars.GITHUB_BRANCH }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required infra settings
        run: |
          : "${CDK_STACK_NAME:=campus-service-hub}"
          : "${CDK_ECR_STACK_NAME:=campus-service-hub-ecr}"
          : "${CDK_KAFKA_STACK_NAME:=campus-service-hub-kafka}"
          : "${CDK_OIDC_STACK_NAME:=campus-service-hub-github-oidc}"
          : "${GITHUB_BRANCH:=main}"

          required=(
            AWS_REGION
            AWS_ACCOUNT_ID
            AWS_ROLE_ARN
          )

          missing=0
          for key in "${required[@]}"; do
            if [ -z "${!key}" ]; then
              echo "Missing required GitHub Actions setting: $key" >&2
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install AWS CDK CLI
        run: npm install -g aws-cdk@2

      - name: Compile infrastructure module
        run: |
          set -euo pipefail
          cd infrastructure
          mvn -q -DskipTests compile

      - name: Deploy ECR stack
        run: |
          set -euo pipefail
          : "${CDK_ECR_STACK_NAME:=campus-service-hub-ecr}"
          cd infrastructure
          cdk deploy "${CDK_ECR_STACK_NAME}" \
            --app "mvn -q -DskipTests exec:java -Dexec.mainClass=com.campushub.stack.EcrRepositoriesApp" \
            --require-approval never

      - name: Resolve ECR repositories
        run: |
          set -euo pipefail
          : "${CDK_ECR_STACK_NAME:=campus-service-hub-ecr}"

          ECR_REPOSITORY_AUTH_SERVICE="$(aws cloudformation describe-stacks --stack-name "${CDK_ECR_STACK_NAME}" --query "Stacks[0].Outputs[?OutputKey=='EcrRepositoryAuthServiceName'].OutputValue | [0]" --output text)"
          ECR_REPOSITORY_REQUEST_SERVICE="$(aws cloudformation describe-stacks --stack-name "${CDK_ECR_STACK_NAME}" --query "Stacks[0].Outputs[?OutputKey=='EcrRepositoryRequestServiceName'].OutputValue | [0]" --output text)"
          ECR_REPOSITORY_BILLING_SERVICE="$(aws cloudformation describe-stacks --stack-name "${CDK_ECR_STACK_NAME}" --query "Stacks[0].Outputs[?OutputKey=='EcrRepositoryBillingServiceName'].OutputValue | [0]" --output text)"
          ECR_REPOSITORY_ANALYTICS_SERVICE="$(aws cloudformation describe-stacks --stack-name "${CDK_ECR_STACK_NAME}" --query "Stacks[0].Outputs[?OutputKey=='EcrRepositoryAnalyticsServiceName'].OutputValue | [0]" --output text)"
          ECR_REPOSITORY_API_GATEWAY="$(aws cloudformation describe-stacks --stack-name "${CDK_ECR_STACK_NAME}" --query "Stacks[0].Outputs[?OutputKey=='EcrRepositoryApiGatewayName'].OutputValue | [0]" --output text)"

          for value in \
            "${ECR_REPOSITORY_AUTH_SERVICE}" \
            "${ECR_REPOSITORY_REQUEST_SERVICE}" \
            "${ECR_REPOSITORY_BILLING_SERVICE}" \
            "${ECR_REPOSITORY_ANALYTICS_SERVICE}" \
            "${ECR_REPOSITORY_API_GATEWAY}"; do
            if [ -z "${value}" ] || [ "${value}" = "None" ] || [ "${value}" = "null" ]; then
              echo "Failed to resolve ECR repository names from ${CDK_ECR_STACK_NAME}." >&2
              exit 1
            fi
          done

          echo "ECR_REPOSITORY_AUTH_SERVICE=${ECR_REPOSITORY_AUTH_SERVICE}" >> "$GITHUB_ENV"
          echo "ECR_REPOSITORY_REQUEST_SERVICE=${ECR_REPOSITORY_REQUEST_SERVICE}" >> "$GITHUB_ENV"
          echo "ECR_REPOSITORY_BILLING_SERVICE=${ECR_REPOSITORY_BILLING_SERVICE}" >> "$GITHUB_ENV"
          echo "ECR_REPOSITORY_ANALYTICS_SERVICE=${ECR_REPOSITORY_ANALYTICS_SERVICE}" >> "$GITHUB_ENV"
          echo "ECR_REPOSITORY_API_GATEWAY=${ECR_REPOSITORY_API_GATEWAY}" >> "$GITHUB_ENV"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Seed initial images
        env:
          IMAGE_TAG: seed-${{ github.sha }}
        run: |
          set -euo pipefail
          ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

          build_and_push() {
            local context="$1"
            local repository="$2"
            local image_uri="${ECR_REGISTRY}/${repository}"
            echo "Seeding linux/amd64 ${image_uri}:${IMAGE_TAG}"
            docker buildx build \
              --platform linux/amd64 \
              --tag "${image_uri}:${IMAGE_TAG}" \
              --tag "${image_uri}:latest" \
              --push \
              "${context}"
          }

          build_and_push "./auth-service" "${ECR_REPOSITORY_AUTH_SERVICE}"
          build_and_push "./request-service" "${ECR_REPOSITORY_REQUEST_SERVICE}"
          build_and_push "./billing-service" "${ECR_REPOSITORY_BILLING_SERVICE}"
          build_and_push "./analytics-service" "${ECR_REPOSITORY_ANALYTICS_SERVICE}"
          build_and_push "./api-gateway" "${ECR_REPOSITORY_API_GATEWAY}"

      - name: Deploy core and Kafka stacks
        run: |
          set -euo pipefail
          : "${CDK_STACK_NAME:=campus-service-hub}"
          : "${CDK_KAFKA_STACK_NAME:=campus-service-hub-kafka}"
          cd infrastructure

          # First pass: ensure VPC and core infra exist.
          cdk deploy "${CDK_STACK_NAME}" \
            --app "mvn -q -DskipTests exec:java -Dexec.mainClass=com.campushub.stack.LocalStack" \
            --require-approval never

          # Deploy Kafka after VPC exists.
          cdk deploy "${CDK_KAFKA_STACK_NAME}" \
            --app "mvn -q -DskipTests exec:java -Dexec.mainClass=com.campushub.stack.KafkaStackApp" \
            --require-approval never

          # Reconcile core with resolved MSK bootstrap endpoints.
          # First try CloudFormation outputs (most stable for current permissions),
          # then fall back to resource lookup paths.
          KAFKA_CLUSTER_ARN="$(aws cloudformation describe-stacks \
            --stack-name "${CDK_KAFKA_STACK_NAME}" \
            --query "Stacks[0].Outputs[?OutputKey=='KafkaClusterArn'].OutputValue | [0]" \
            --output text 2>/dev/null || true)"

          if [ -z "${KAFKA_CLUSTER_ARN}" ] || [ "${KAFKA_CLUSTER_ARN}" = "None" ] || [ "${KAFKA_CLUSTER_ARN}" = "null" ]; then
            KAFKA_CLUSTER_ARN="$(aws cloudformation describe-stack-resource \
              --stack-name "${CDK_KAFKA_STACK_NAME}" \
              --logical-resource-id "MskCluster" \
              --query "StackResourceDetail.PhysicalResourceId" \
              --output text 2>/dev/null || true)"
          fi

          if [ -z "${KAFKA_CLUSTER_ARN}" ] || [ "${KAFKA_CLUSTER_ARN}" = "None" ] || [ "${KAFKA_CLUSTER_ARN}" = "null" ]; then
            KAFKA_CLUSTER_ARN="$(aws kafka list-clusters-v2 \
              --cluster-name-filter "kafka-cluster" \
              --query "ClusterInfoList[0].ClusterArn" \
              --output text 2>/dev/null || true)"
          fi

          if [ -z "${KAFKA_CLUSTER_ARN}" ] || [ "${KAFKA_CLUSTER_ARN}" = "None" ] || [ "${KAFKA_CLUSTER_ARN}" = "null" ]; then
            echo "Failed to resolve Kafka cluster ARN from ${CDK_KAFKA_STACK_NAME}." >&2
            exit 1
          fi

          KAFKA_BOOTSTRAP_SERVERS=""
          for attempt in $(seq 1 50); do
            KAFKA_BOOTSTRAP_SERVERS="$(aws kafka get-bootstrap-brokers \
              --cluster-arn "${KAFKA_CLUSTER_ARN}" \
              --query 'BootstrapBrokerStringTls' \
              --output text 2>/dev/null || true)"

            if [ -n "${KAFKA_BOOTSTRAP_SERVERS}" ] && [ "${KAFKA_BOOTSTRAP_SERVERS}" != "None" ] && [ "${KAFKA_BOOTSTRAP_SERVERS}" != "null" ]; then
              break
            fi

            echo "Waiting for MSK bootstrap brokers to become available (attempt ${attempt}/50)..."
            sleep 30
          done

          if [ -z "${KAFKA_BOOTSTRAP_SERVERS}" ] || [ "${KAFKA_BOOTSTRAP_SERVERS}" = "None" ] || [ "${KAFKA_BOOTSTRAP_SERVERS}" = "null" ]; then
            echo "Failed to resolve MSK bootstrap brokers for ${KAFKA_CLUSTER_ARN}." >&2
            exit 1
          fi

          KAFKA_BOOTSTRAP_SERVERS="${KAFKA_BOOTSTRAP_SERVERS}" \
          KAFKA_SECURITY_PROTOCOL="SSL" \
          KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM="https" \
          cdk deploy "${CDK_STACK_NAME}" \
            --app "mvn -q -DskipTests exec:java -Dexec.mainClass=com.campushub.stack.LocalStack" \
            --require-approval never

      - name: Deploy GitHub OIDC stack (optional)
        if: ${{ env.GITHUB_OWNER != '' && env.GITHUB_REPO != '' }}
        run: |
          set -euo pipefail
          : "${CDK_OIDC_STACK_NAME:=campus-service-hub-github-oidc}"
          : "${GITHUB_BRANCH:=main}"
          cd infrastructure
          GITHUB_OWNER="${GITHUB_OWNER}" \
          GITHUB_REPO="${GITHUB_REPO}" \
          GITHUB_BRANCH="${GITHUB_BRANCH}" \
          cdk deploy "${CDK_OIDC_STACK_NAME}" \
            --app "mvn -q -DskipTests exec:java -Dexec.mainClass=com.campushub.stack.GithubActionsOidcRoleApp" \
            --require-approval never
