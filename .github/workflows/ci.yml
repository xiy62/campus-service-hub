name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  unit-tests:
    name: Unit Tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - request-service
          - billing-service
          - analytics-service
          - api-gateway

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run unit tests
        working-directory: ${{ matrix.service }}
        run: ./mvnw -B test

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and start stack
        run: docker compose up -d --build

      - name: Wait for gateway
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:4004/api-docs/auth >/dev/null 2>&1; then
              exit 0
            fi
            sleep 5
          done
          echo "Gateway not healthy in time" >&2
          docker compose ps
          exit 1

      - name: Run integration tests
        working-directory: integration-tests
        run: mvn -B clean test

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down stack
        if: always()
        run: docker compose down -v
