services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

  auth-db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME:-auth_service_db}
      POSTGRES_USER: ${AUTH_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data

  request-db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${REQUEST_DB_NAME:-request_service_db}
      POSTGRES_USER: ${REQUEST_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${REQUEST_DB_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - request_db_data:/var/lib/postgresql/data

  auth-service:
    build:
      context: ./auth-service
    depends_on:
      - auth-db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-db:5432/${AUTH_DB_NAME:-auth_service_db}
      SPRING_DATASOURCE_USERNAME: ${AUTH_DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${AUTH_DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-Q2hvbGNvbGF0ZXMgdGV4dCB3aXRoIDMyYnl0ZXMgaGVyZSE=}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_SQL_INIT_MODE: always
    ports:
      - "4005:4005"

  billing-service:
    build:
      context: ./billing-service
    ports:
      - "4001:4001"
      - "9001:9001"

  request-service:
    build:
      context: ./request-service
    depends_on:
      - request-db
      - billing-service
      - kafka
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://request-db:5432/${REQUEST_DB_NAME:-request_service_db}
      SPRING_DATASOURCE_USERNAME: ${REQUEST_DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${REQUEST_DB_PASSWORD:-postgres}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_SQL_INIT_MODE: always
      BILLING_SERVICE_ADDRESS: billing-service
      BILLING_SERVICE_GRPC_PORT: 9001
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
    ports:
      - "4000:4000"

  analytics-service:
    build:
      context: ./analytics-service
    depends_on:
      - kafka
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
    ports:
      - "4002:4002"

  api-gateway:
    build:
      context: ./api-gateway
    depends_on:
      - auth-service
      - request-service
    environment:
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:4005}
      REQUEST_SERVICE_URL: ${REQUEST_SERVICE_URL:-http://request-service:4000}
    ports:
      - "4004:4004"

volumes:
  auth_db_data:
  request_db_data:
